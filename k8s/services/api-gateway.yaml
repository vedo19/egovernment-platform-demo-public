apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: egovernment
data:
  ocelot.json: |
    {
      "Routes": [
        {
          "UpstreamPathTemplate": "/api/auth/{everything}",
          "UpstreamHttpMethod": ["GET", "POST", "PUT", "DELETE"],
          "DownstreamPathTemplate": "/api/auth/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "auth-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/citizens/{everything}",
          "UpstreamHttpMethod": ["GET", "POST", "PUT", "DELETE"],
          "DownstreamPathTemplate": "/api/citizens/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "citizen-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/citizens",
          "UpstreamHttpMethod": ["GET", "POST"],
          "DownstreamPathTemplate": "/api/citizens",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "citizen-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/servicerequests/{everything}",
          "UpstreamHttpMethod": ["GET", "POST", "PUT", "DELETE"],
          "DownstreamPathTemplate": "/api/servicerequests/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "service-request-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/servicerequests",
          "UpstreamHttpMethod": ["GET", "POST"],
          "DownstreamPathTemplate": "/api/servicerequests",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "service-request-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/applications/{everything}",
          "UpstreamHttpMethod": ["GET", "POST", "PUT", "DELETE"],
          "DownstreamPathTemplate": "/api/servicerequests/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "service-request-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/applications",
          "UpstreamHttpMethod": ["GET", "POST"],
          "DownstreamPathTemplate": "/api/servicerequests",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "service-request-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/documents/{everything}",
          "UpstreamHttpMethod": ["GET", "POST", "PUT", "DELETE"],
          "DownstreamPathTemplate": "/api/documents/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "document-service", "Port": 8080 }
          ]
        },
        {
          "UpstreamPathTemplate": "/api/documents",
          "UpstreamHttpMethod": ["GET", "POST"],
          "DownstreamPathTemplate": "/api/documents",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            { "Host": "document-service", "Port": 8080 }
          ]
        }
      ],
      "GlobalConfiguration": {
        "BaseUrl": "http://api-gateway.egovernment.svc.cluster.local:8080"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: egovernment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: ocelot-config
              mountPath: /app/ocelot.json
              subPath: ocelot.json
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: ocelot-config
          configMap:
            name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: egovernment
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP