apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: egovernment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: document-service
          image: document-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /api/documents/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/documents/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: document-uploads
              mountPath: /app/uploads
      volumes:
        - name: document-uploads
          persistentVolumeClaim:
            claimName: document-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: egovernment
spec:
  selector:
    app: document-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP