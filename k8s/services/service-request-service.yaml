apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-request-service
  namespace: egovernment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-request-service
  template:
    metadata:
      labels:
        app: service-request-service
    spec:
      containers:
        - name: service-request-service
          image: service-request-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /api/servicerequests/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/servicerequests/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: service-request-service
  namespace: egovernment
spec:
  selector:
    app: service-request-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP