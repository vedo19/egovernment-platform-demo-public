name: Auth Service CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: src/AuthService/AuthService.csproj

      - name: Restore
        run: dotnet restore src/AuthService/AuthService.csproj

      - name: Build
        run: dotnet build src/AuthService/AuthService.csproj --configuration Release --no-restore
