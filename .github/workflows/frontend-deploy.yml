name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - 'k8s/services/frontend.yaml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/egovernment-platform-demo-public
      IMAGE_TAG: ${{ github.sha }}
      NAMESPACE: egovernment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f src/frontend/Dockerfile -t "$IMAGE_PREFIX/frontend:$IMAGE_TAG" -t "$IMAGE_PREFIX/frontend:latest" src/frontend
          docker push "$IMAGE_PREFIX/frontend:$IMAGE_TAG"
          docker push "$IMAGE_PREFIX/frontend:latest"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo '${{ secrets.KUBE_CONFIG_B64 }}' | base64 -d > "$HOME/.kube/config"

      - name: Render frontend manifest
        run: |
          set -euo pipefail

          rm -rf _deploy
          mkdir -p _deploy/k8s/services

          cp k8s/services/frontend.yaml _deploy/k8s/services/frontend.yaml
          sed -i "s|image: frontend:dev|image: ${IMAGE_PREFIX}/frontend:${IMAGE_TAG}|g" _deploy/k8s/services/frontend.yaml

      - name: Apply frontend service
        run: |
          kubectl apply -f _deploy/k8s/services/frontend.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=10m

      - name: Show final status
        run: |
          kubectl get pods -n "$NAMESPACE"
          kubectl get svc -n "$NAMESPACE"
