name: Cluster Bootstrap

on:
  workflow_dispatch:
    inputs:
      ingress_host:
        description: Public hostname or IPv4-based host for the cluster ingress
        required: true
        default: egovernment.example.com

permissions:
  contents: read
  packages: write

concurrency:
  group: cluster-bootstrap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      INGRESS_HOST: ${{ github.event.inputs.ingress_host || secrets.INGRESS_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup cluster access
        uses: ./.github/actions/setup-ghcr-kube
        with:
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          kube-config-b64: ${{ secrets.KUBE_CONFIG_B64 }}

      - name: Render bootstrap manifests
        run: |
          set -euo pipefail

          rm -rf _bootstrap
          mkdir -p _bootstrap/k8s/config _bootstrap/k8s/storage _bootstrap/k8s/ingress _bootstrap/k8s/postgres

          cp k8s/config/configmap-app.yaml _bootstrap/k8s/config/configmap-app.yaml
          cp k8s/postgres/*.yaml _bootstrap/k8s/postgres/
          cp k8s/ingress/ingress.yaml _bootstrap/k8s/ingress/ingress.yaml
          cp k8s/rabbitmq/rabbitmq.yaml _bootstrap/k8s/rabbitmq.yaml

          cat > _bootstrap/k8s/config/secret-bootstrap.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-secrets
            namespace: egovernment
          type: Opaque
          stringData:
            AuthDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            CitizenDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            RequestDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            DocumentDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            NotificationDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            AuditDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            Jwt__Key: ${{ secrets.JWT_SECRET_KEY }}
            Admin__Email: ${{ secrets.ADMIN_EMAIL }}
            Admin__Password: ${{ secrets.ADMIN_PASSWORD }}
            Admin__FullName: ${{ secrets.ADMIN_FULLNAME }}
            RabbitMQ__Username: ${{ secrets.RABBITMQ_DEFAULT_USER }}
            RabbitMQ__Password: ${{ secrets.RABBITMQ_DEFAULT_PASS }}
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-secrets
            namespace: egovernment-db
          type: Opaque
          stringData:
            AuthDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            CitizenDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            RequestDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            DocumentDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            NotificationDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
            AuditDb__Password: ${{ secrets.POSTGRES_PASSWORD }}
          EOF

          cat > _bootstrap/k8s/storage/document-uploads-shared.yaml <<'EOF'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: document-uploads-pvc
            namespace: egovernment
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
          EOF

          sed -i "s/ASPNETCORE_ENVIRONMENT: Development/ASPNETCORE_ENVIRONMENT: Production/" _bootstrap/k8s/config/configmap-app.yaml
          sed -i "s|egovernment.local|${INGRESS_HOST}|g" _bootstrap/k8s/ingress/ingress.yaml

      - name: Apply bootstrap resources
        run: |
          set -euo pipefail

          wait_for_api() {
            for attempt in {1..30}; do
              if kubectl --request-timeout=30s get --raw='/readyz' >/dev/null 2>&1; then
                return 0
              fi
              echo "Kubernetes API not ready (attempt $attempt). Retrying in 5s..."
              sleep 5
            done

            echo "Kubernetes API did not become ready in time." >&2
            exit 1
          }

          apply_with_retry() {
            local label="$1"
            local target="$2"

            for attempt in {1..10}; do
              if kubectl --request-timeout=60s apply -f "$target"; then
                return 0
              fi

              echo "Apply failed for $label (attempt $attempt). Retrying in 15s..."
              sleep 15
              wait_for_api
            done

            echo "Failed to apply $label after 10 attempts." >&2
            exit 1
          }

          for namespace in egovernment-db egovernment messaging monitoring; do
            success=0
            for attempt in {1..20}; do
              if kubectl --request-timeout=60s create namespace "$namespace" >/dev/null 2>&1 || \
                 kubectl --request-timeout=60s get namespace "$namespace" >/dev/null 2>&1; then
                success=1
                wait_for_api
                break
              fi
              echo "Namespace create failed for $namespace (attempt $attempt). Retrying in 10s..."
              sleep 10
            done

            if [[ "$success" -ne 1 ]]; then
              echo "Failed to create namespace $namespace after 20 attempts." >&2
              exit 1
            fi
          done

          wait_for_api
          apply_with_retry configmap _bootstrap/k8s/config/configmap-app.yaml
          apply_with_retry secret-bootstrap _bootstrap/k8s/config/secret-bootstrap.yaml
          apply_with_retry postgres _bootstrap/k8s/postgres/
          apply_with_retry rabbitmq _bootstrap/k8s/rabbitmq.yaml
          apply_with_retry document-uploads-shared _bootstrap/k8s/storage/document-uploads-shared.yaml
          apply_with_retry ingress _bootstrap/k8s/ingress/ingress.yaml

      - name: Show bootstrap status
        run: |
          kubectl get ns
          kubectl get pods -n egovernment-db
          kubectl get pods -n messaging
          kubectl get configmaps,secrets -n egovernment
          kubectl get ingress -n egovernment
